<!DOCTYPE html> 
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你的付出</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: auto;
            padding: 20px;
            text-align: center;
            background: #f9f9f9;
        }
        h2 {
            color: #333;
        }
        .scale-container {
            width: 100%;
            height: 50px;
            background: #ddd;
            margin: 20px 0;
            position: relative;
            border-radius: 25px;
            overflow: hidden;
        }
        .fill {
            height: 50px;
            background: #4CAF50;
            width: 0%;
            border-radius: 25px;
            transition: width 0.2s;
        }
        .slider {
            width: 100%;
            margin: 20px 0;
        }
        .percentage {
            font-size: 2em;
            margin: 10px;
            color: #333;
        }
        p {
            color: #555;
        }
    </style>
</head>
<body>
    <h2>你的付出</h2>
    <p>願意委身給上帝的程度</p>

    <input type="range" min="0" max="100" value="50" class="slider" id="devotionSlider" oninput="updateFill()">

    <div class="percentage"><span id="percent">50</span>%</div>

    <div class="scale-container">
        <div id="fillBar" class="fill" style="width:50%"></div>
    </div>

    <p>拖動滑塊表示你今天願意付出的百分比。</p>

    <script>
        function updateFill() {
            let val = document.getElementById('devotionSlider').value;
            document.getElementById('percent').innerText = val;
            document.getElementById('fillBar').style.width = val + '%';
        }
    </script>
</body>
</html>
